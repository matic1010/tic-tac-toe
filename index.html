<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="message">Player X's turn</div>
    <div class="board">
      <button class="cell no-t no-l" data-index="0"></button>
      <button class="cell no-t" data-index="1"></button>
      <button class="cell no-t no-r" data-index="2"></button>
      <button class="cell no-l" data-index="3"></button>
      <button class="cell" data-index="4"></button>
      <button class="cell no-r" data-index="5"></button>
      <button class="cell no-b no-l" data-index="6"></button>
      <button class="cell no-b" data-index="7"></button>
      <button class="cell no-b no-r" data-index="8"></button>
    </div>
    <script src="index.js"></script>
  </body>
</html>
